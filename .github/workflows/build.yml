name: Build

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: temurin
          cache: gradle

      - name: Set Git identity
        run: |
          git config --global user.email "actions@github.com"
          git config --global user.name "GitHub Actions"
          git config --global init.defaultBranch master

      - name: Setup build environment
        id: panda_setup
        run: ./panda setup 2>&1 | tee /tmp/build-output.log

      - name: Apply patches
        id: panda_patch
        run: ./panda patch 2>&1 | tee -a /tmp/build-output.log

      - name: Build
        id: gradle_build
        env:
          # Gradle daemon + build cache + configuration cache cut rebuild
          # time from ~4 min to ~1-2 min on warm caches.
          GRADLE_OPTS: "-Dorg.gradle.daemon=true -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"
        run: |
          set -o pipefail
          ./gradlew build paperclipJar \
            --console=plain \
            --build-cache \
            --parallel \
            2>&1 | tee -a /tmp/build-output.log

      - name: Commit build log on failure (debug path for sandboxed reviewers)
        if: failure()
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="ci-debug/run-${{ github.run_number }}"
          cp /tmp/build-output.log /tmp/saved.log 2>/dev/null || echo "no log captured" > /tmp/saved.log
          git checkout --orphan "$BRANCH"
          git rm -rf --quiet . >/dev/null 2>&1 || true
          tail -c 200000 /tmp/saved.log > "run-${{ github.run_number }}.log"
          git add "run-${{ github.run_number }}.log"
          git -c user.email=actions@github.com -c user.name="GitHub Actions" \
              commit -m "ci-debug: build log for run #${{ github.run_number }}"
          git push "https://x-access-token:${GH_PAT}@github.com/${{ github.repository }}.git" "$BRANCH"

      - name: Copy Paperclip jar
        run: |
          cp -v "./paperclip/build/libs/paperclip-1.8.8-R0.1-SNAPSHOT.jar" "./enospigot-$GITHUB_RUN_NUMBER.jar"
          cp -v "./paperclip/build/libs/paperclip-1.8.8-R0.1-SNAPSHOT.jar" "./enospigot.jar"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Server JAR
          path: enospigot-${{ github.run_number }}.jar
          if-no-files-found: error

      # ─── Publish release (only on master push) ─────────────────
      # Two tags:
      #   - `latest` (moving) → stable URL for EnoInfrastructure to fetch
      #   - `build-N` (permanent) → rollback history
      - name: Publish GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          RUN_NUM="${{ github.run_number }}"

          # Versioned tag — one per successful build, immutable
          gh release create "build-${RUN_NUM}" \
            --title "Build #${RUN_NUM} (${SHA_SHORT})" \
            --notes "Auto-built from ${{ github.sha }}" \
            "./enospigot.jar#enospigot.jar" || echo "build tag already exists, skipping"

          # Moving `latest` tag — EnoInfrastructure downloads from this URL:
          # https://github.com/mimiflo/EnoSpigot/releases/latest/download/enospigot.jar
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest \
            --title "EnoSpigot latest (build #${RUN_NUM}, ${SHA_SHORT})" \
            --notes "Moving tag — always points to the latest successful master build. Commit: ${{ github.sha }}" \
            --latest \
            "./enospigot.jar#enospigot.jar"

          # Prune old build-N releases — keep the 20 most recent for rollback.
          # Without this, the releases tab grows unboundedly.
          echo "Pruning build-N releases (keeping last 20)..."
          gh release list --limit 200 --json tagName,createdAt \
            | python3 -c 'import sys,json; rs=sorted([r for r in json.load(sys.stdin) if r["tagName"].startswith("build-")], key=lambda r: r["createdAt"], reverse=True); [print(r["tagName"]) for r in rs[20:]]' \
            | while read -r tag; do
                echo "  deleting $tag"
                gh release delete "$tag" --yes --cleanup-tag 2>/dev/null || true
              done

      # ─── Notify EnoInfrastructure (best-effort, works if PAT present) ───
      # Requires secret ENOINFRA_DISPATCH_TOKEN with Contents R/W on mimiflo/EnoInfrastructure.
      # If missing, EnoInfrastructure polls every 5 min as fallback.
      - name: Trigger EnoInfrastructure sync
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        continue-on-error: true
        env:
          GH_PAT: ${{ secrets.ENOINFRA_DISPATCH_TOKEN }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "ENOINFRA_DISPATCH_TOKEN not set — skipping dispatch (polling fallback will kick in within 15 min)"
            exit 0
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer $GH_PAT" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/mimiflo/EnoInfrastructure/dispatches \
            -d '{"event_type":"enospigot-updated","client_payload":{"sha":"${{ github.sha }}","run":"${{ github.run_number }}"}}' \
            && echo "Dispatch sent" || echo "Dispatch failed (non-fatal)"
